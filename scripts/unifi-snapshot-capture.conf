# UniFi camera snapshot capture config
# This file is sourced by /bin/sh, so keep normal shell syntax:
# VARIABLE="value"
# No spaces around the = sign.

###############################################################################
# Camera connection
###############################################################################

# Camera hostname or IP address.
# Required unless CAMERA_SNAPSHOT_URL is set.
CAMERA_HOST="192.168.1.50"

# Camera protocol: http or https.
# Many direct camera snapshot endpoints use http.
CAMERA_SCHEME="http"

# Optional camera port.
# Leave empty if the camera uses the default port for http/https.
CAMERA_PORT=""

# Snapshot path on the camera.
# Common examples:
#   /snap.jpeg
#   /snap.jpg
#   /snapshot.jpg
CAMERA_PATH="/snap.jpeg"

# Optional full snapshot URL.
# If this is set, it overrides CAMERA_HOST, CAMERA_SCHEME, CAMERA_PORT,
# and CAMERA_PATH.
#
# Example:
# CAMERA_SNAPSHOT_URL="http://192.168.1.50/snap.jpeg"
#
CAMERA_SNAPSHOT_URL=""

###############################################################################
# Camera authentication
###############################################################################

# Leave both empty if your camera snapshot URL does not require authentication.
CAMERA_USERNAME=""
CAMERA_PASSWORD=""

# Example with authentication:
# CAMERA_USERNAME="ubnt"
# CAMERA_PASSWORD="your-camera-password"

###############################################################################
# TLS / HTTPS
###############################################################################

# Set to 1 if using https with a self-signed certificate.
# Set to 0 if you want normal certificate verification.
INSECURE_TLS="1"

###############################################################################
# Output location
###############################################################################

# Folder where snapshots will be saved.
OUTPUT_DIR="/volume1/photo/unifi-snapshots"

# Prefix used in snapshot filenames.
# Example output:
# front-door_20260528-153000.jpg
FILE_PREFIX="front-door"

# File permissions for saved snapshots.
# 0644 usually works well for Synology Photos or other services.
FILE_MODE="0644"

###############################################################################
# Capture interval
###############################################################################

# Capture every 15 minutes.
# 900 seconds = 15 minutes.
INTERVAL_SECONDS="900"

# Curl connection timeout in seconds.
CONNECT_TIMEOUT="10"

# Maximum time allowed for the whole snapshot request.
MAX_TIME="60"

###############################################################################
# Optional schedule
###############################################################################

# Leave START_TIME, END_TIME, and ACTIVE_DAYS empty to capture all day, every day.
START_TIME=""
END_TIME=""
ACTIVE_DAYS=""

# Example: only capture Monday to Friday from 08:00 to 20:00
# START_TIME="08:00"
# END_TIME="20:00"
# ACTIVE_DAYS="mon,tue,wed,thu,fri"

# Example: overnight schedule from 22:00 to 06:00 every day
# START_TIME="22:00"
# END_TIME="06:00"
# ACTIVE_DAYS="sun,mon,tue,wed,thu,fri,sat"

###############################################################################
# Logging
###############################################################################

# Optional log file.
# Leave empty to use:
#   OUTPUT_DIR/unifi_snapshot_capture.log
LOG_FILE=""

# Or set an explicit log file:
# LOG_FILE="/volume1/photo/unifi-snapshots/unifi_snapshot_capture.log"
